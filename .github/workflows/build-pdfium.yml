name: Build PDFium (manual)

on:
  workflow_dispatch: {}

jobs:
  build-pdfium:
    name: Build PDFium xcframework (macOS)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -e
          brew update || true
          brew install ninja python@3 cmake || true

      - name: Run build script
        run: |
          set -e
          chmod +x Scripts/build-pdfium.sh
          Scripts/build-pdfium.sh

      - name: Upload artifact (PDFium.xcframework placeholder)
        if: success() && (always())
        uses: actions/upload-artifact@v4
        with:
          name: pdfium-xcframework
          path: ThirdParty/pdfium/PDFium.xcframework
