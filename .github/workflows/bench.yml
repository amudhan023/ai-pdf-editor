name: Bench

# Manual-trigger only (root CLAUDE.md/AGENT_LOOP.md govern when perf/accuracy
# regressions block a PR — that gate is per-task via Scripts/bench.sh, not
# this workflow). Runs every Scripts/bench.sh suite and publishes the JSON
# result as a workflow artifact so trend comparisons have something to diff
# against; see Scripts/bench.sh's own header for which suites are fully live
# today vs. explicitly skipped pending P0-06 (PDFium/DocEngineHost).

on:
  workflow_dispatch:

jobs:
  bench:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Confirm full Xcode toolchain
        run: |
          # Scripts/bench.sh's generator-determinism suite shells out to
          # `swift`; same E-002 guard as ci.yml's verify job.
          xcode-select -p
          xcode-select -p | grep -qE "Xcode(_[0-9.]+)?\.app" || { echo "Full Xcode required, CLT-only runner detected (see E-002)"; exit 1; }

      - name: Run all bench suites
        run: Scripts/bench.sh --all | tee bench-results.json

      - uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench-results.json
          retention-days: 90
